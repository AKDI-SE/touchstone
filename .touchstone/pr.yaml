# ============================================================================
# .touchstone/pr.yaml  ——  提交契约 (Submission Contract)
# ----------------------------------------------------------------------------
# 由 author agent 每个 PR 生成。配套规范见 .touchstone/standards.yaml。
#
# 铁律 · 索引而非凭据：
#   本文件只帮 touchstone / 人"定位该看哪里"。每个声明都会被【独立核对】，
#   对不上即视为发现(Finding)。把它写漂亮骗不过 touchstone——只会浪费你自己的修改轮次。
#
# 极简原则：必填只有三件。其余按价值递减，能填则填；不要为凑字数写废话。
# ============================================================================

schema_version: "0.1"

# ── 必填三件 ───────────────────────────────────────────────────────────────

# 这个 PR 做什么 + 为什么（1–2 句）。
# 【独立核对】diff 是否与 intent 一致 → 偏离即 scope_creep（standards: SCOPE-001）
intent: "<一句话：做什么 + 为什么>"

# 怎样算做成——可验证的判据。★最重要：这是独立验收测试的生成依据（命门入口）。
# 每条都要能被一个测试判定真假；写"输入→期望"或 given/when/then，
# 不要写"应该工作良好""性能更好"这类无法验证的话。
# 【独立核对】独立验收测试作者据此生成验收测试（看不到你的实现）
acceptance_criteria:
  - "<判据 1：如 输入 X → 返回 Y / 当 A 时应 B>"
  - "<判据 2>"

# 本 PR 应触及的路径/区域（glob 或目录）。
# 【独立核对】diff 实际改动范围 vs scope → 范围外改动即 scope_creep（SCOPE-001）
scope:
  - "<path/glob，如 src/parser/**>"

# ── 强烈建议（降低评审重建上下文成本、预防误判）─────────────────────────────

# 复用/扩展了哪些已有工具，或类比了哪段已有代码。
# 【独立核对】vs diff 实际 import → 防"重复造轮子"误判（standards: DUP-001）
reused_components:
  - "<如 复用 utils.config.parse_config()>"

# 你自己知道的风险与不确定处。touchstone 会抬高这些位置的审视权重（但仍独立验证）。
self_noted_risks:
  - "<如 并发路径未充分测试 / 对外部响应结构有假设>"

# 建议重点看哪 2–3 处（给人/touchstone 的地图，不替代看）。
review_guide:
  - "<如 src/parser/limiter.py 的窗口边界处理>"

# ── 仅作补充信号，绝非验收依据 ──────────────────────────────────────────────

# 你加的测试（author_supplementary，standards: TEST-001）。
# 验收以独立验收测试 + 充分性阶梯为准；此处结果不被采信，系统独立重跑。
tests_added:
  - "<test 文件/用例名，可空>"

# ── 系统管理，勿手填 ────────────────────────────────────────────────────────
loop_round: 0      # 反馈循环轮次，由 CI/touchstone 维护；超上限触发升级到人。

