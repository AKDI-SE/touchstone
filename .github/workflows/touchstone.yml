# .github/workflows/touchstone.yml
# Touchstone —— 默认顾问式评审 + 可插拔质量门禁（对外只发一个总闸）。
# 链路：touchstone(评审+风险，不拦截) → (按需) verify_plan(持密不执行)→verify_execute(执行零凭据) → gate(聚合并发布那一个总闸) → (可选) auto_merge。
# verify 与 auto_merge 都是可选、默认关的进阶路径。
name: Touchstone

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  # 按 PR 号而非 head.sha 分组：同 PR 快速连推时，新轮自动取消旧 SHA 的在途轮——
  # 否则两轮并发跑，旧轮可能在新轮之后回贴过期评论（轮序错乱）。取消掉的旧轮
  # 无副作用：回贴/产物尚未发生，lineage 按内容指纹记账不受缺轮影响。
  group: touchstone-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  # actions:write 下沉到 touchstone job（写 actions 缓存用）——见该 job 的 permissions 块。
  # fork PR 受 GitHub 防缓存投毒限制仍只读（不写）→ 该步退化为"每次重建"=今天的速度，
  # import 兜底检查保证不崩、日志可观测是否命中。

jobs:
  # ---- 判断层：评审（advisory，不拦截；不在此发总闸，交给 gate job）----
  touchstone:
    runs-on: ubuntu-latest          # 自托管 runner 见下方网络注记
    outputs:
      decision: ${{ steps.run.outputs.verification_decision }}
      risk_band: ${{ steps.run.outputs.risk_band }}
    permissions:
      contents: read
      pull-requests: write      # orchestrator 发评审评论
      checks: write             # 默认 SKIP_GATE=true 由 gate job 发总闸；保留以兼容关 SKIP_GATE 的部署
      actions: write            # 写 .pragent-venv 的 actions 缓存（从 workflow 级下沉到 job 级=最小特权显式化）
    env:
      # pr-agent 版本单一来源：下方 cache key 与 pip install 同引此变量，升版只改这一行（两处自动同步刷新）。
      PRA_VERSION: "0.39.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        id: py
        with:
          # 钉 3.13：pr-agent 的原生依赖（tiktoken 经 PyO3 0.22.6）暂不支持 3.14，会源码编译失败。
          python-version: "3.13"
      - name: Install deps
        run: pip install -e .
        # 自托管 runner 若经代理访问公网：按需设置/清理 *_PROXY；可选用私有/就近 PyPI 镜像加速 pip install
      - name: Restore PR-Agent venv (cache)
        # 缓存装好的 .pragent-venv（pr-agent + 130+ 依赖），省掉每次 ~64s 的 venv 创建 + pip install
        # （实测每轮 GHA 日志：venv 步骤稳定 ~64s，是 LLM 调用之外最大固定开销）。
        # 键含 OS + Python【补丁号】(steps.py.outputs.python-version，如 3.13.14) + pr-agent 版本：
        # 解释器补丁升级 / OS / pr-agent 版本任一变即 miss→重建并重新持久化（自愈）。
        # 拆 restore/save（闭环 round-5 finding「Persist cache even when job fails downstream」）：
        # 本步只 restore（命中即复用）；save 下移到独立步、if: success()——仅整条 touchstone job 成功
        # （含 Run review）才持久化，避免从失败 run 把状态写进缓存。降级轮 job 仍判 success
        # （orchestrator 优雅降级 exit 0，已实证 run 29463635695），故不损命中率；只真崩溃才跳 save（正是期望）。
        # 边界：save 仍仅在【miss】时写回——key 匹配但内容失效（罕见镜像内部变更未带补丁号变）时不自动刷新，
        # 靠下方 import 兜底检查【每轮】重建保证可用（正确性不失）；要永久刷新该条目需手动 bump key 后缀（-v1→-v2）。
        id: pragent-venv
        uses: actions/cache/restore@v4
        with:
          path: .pragent-venv
          key: pragent-venv-${{ runner.os }}-py${{ steps.py.outputs.python-version }}-pragent${{ env.PRA_VERSION }}-lock${{ hashFiles('pragent-constraints.txt') }}-v1
      - name: Set up PR-Agent (independent venv)
        # PR-Agent 是评审引擎（Apache-2.0 pip 包），按"不进本仓依赖"原则装在独立 venv。
        # continue-on-error：装失败不让整个评审 job 崩（那样连评审都不发）；orchestrator 会优雅降级、
        # 在 PR 评审里显式标注"AI 评审未运行"（防静默故障，见 README）。
        #
        # 缓存命中且 import 可用 → 直接复用（省 ~60s）；否则（首次 / 缓存失效 / runner 镜像内部变更致
        # venv 绝对路径失效）重建。import 兜底检查防"命中缓存却跑崩"的静默故障——venv 含绝对路径，
        # 即便 key 匹配，镜像内部工具链变更仍可能让缓存"在"但"不可导入"；此检查确保可用才复用。
        # 钉 pr-agent 版本：让缓存键精确、可复现。版本号统一取上方 env.PRA_VERSION——升版只改那一行，
        # 本处的 pip pin 与 cache key 两处自动同步刷新（不再需要手动改两行）。
        continue-on-error: true
        run: |
          if [ -x .pragent-venv/bin/python ] && .pragent-venv/bin/python -c 'import pr_agent' 2>/dev/null; then
            echo "[pragent-venv] 缓存命中且可用，复用（跳过创建）"
          else
            echo "[pragent-venv] 缓存未命中或失效，创建中"
            rm -rf .pragent-venv
            # 三步装 venv 全部纳入守护（venv 创建 / pip 升级 / pip 装 pr-agent）：bash -eo pipefail 下
            # 任一步失败若裸写会 set -e 立即 abort、绕过下方清理 → 留 partial .pragent-venv 在盘 →
            # actions/cache post 步把它持久化成"key 命中却 import 不了"的脏条目（continue-on-error 让本步
            # 照常过、cache 照常 save）。放进 if 条件（set -e 不作用于 if/until/while 的条件命令）→ 任一失败
            # 走 else 的 rm -rf 清理，cache post 见 path 不存在→跳过 save，下次 key miss 重建干净的。
            # 评审结论不受影响：venv 没了→runner import 失败→orchestrator 优雅降级标注"AI 评审未运行"
            # （与留着破损 venv 走 import 失败→降级同路）。纯缓存卫生修复，零行为变化。
            if python -m venv .pragent-venv \
               && .pragent-venv/bin/pip install -U pip \
               && .pragent-venv/bin/pip install pr-agent==${{ env.PRA_VERSION }} -c pragent-constraints.txt; then
              echo "[pragent-venv] 安装成功"
            else
              echo "[pragent-venv] 安装失败——清理破损 venv，避免被缓存污染"
              rm -rf .pragent-venv
            fi
          fi
      - name: Run review
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY:  ${{ secrets.LLM_API_KEY }}
          LLM_MODEL:    ${{ secrets.LLM_MODEL }}      # pr_agent_runner 映射成 LiteLLM 的 openai/<model> + OPENAI_API_KEY/BASE
          # LLM 上下文/输出 token 预算（部署方按模型卡填 secret）。
          # TOUCHSTONE_LLM_CONTEXT_TOKENS 是【输入侧上下文窗口】——pr-agent 的 get_max_tokens 用它作 diff
          # 裁剪预算；不接或过小（如 4096）会把改动 diff 裁空→LLM 0 建议（PR #44 真根因）。未设则 runner 回退 128000。
          TOUCHSTONE_LLM_CONTEXT_TOKENS: ${{ secrets.TOUCHSTONE_LLM_CONTEXT_TOKENS }}
          TOUCHSTONE_LLM_OUTPUT_TOKENS:  ${{ secrets.TOUCHSTONE_LLM_OUTPUT_TOKENS }}
          TOUCHSTONE_PRAGENT_CMD: ".pragent-venv/bin/python -m touchstone.pr_agent_runner"
          TOUCHSTONE_INTERACTION_LOG: "pr-agent-interaction.log"   # 完整 LLM 交互日志（artifact，评审评论里贴链接）
          TOUCHSTONE_PRAGENT_TIMEOUT: "3600"            # pr-agent 子进程超时（秒）。glm-5.2 慢（单次 360s+），
                                                          # improve+review 各含重试，需足够余量；可调
          TOUCHSTONE_LLM_CALL_TIMEOUT: "600"            # 单次 LLM 调用超时（秒，pr-agent ai_timeout）。【语义勘误】
                                                          # 这是 httpx per-read 超时、不是墙钟：端点持续出字节则不触发
                                                          # （生产单调用实测 1515s；滴流实验可无限续命）。流式化后该语义
                                                          # 恰好变正确：真死等 600s 必杀、持续出字不误杀。
          TOUCHSTONE_LLM_REFLECT_MODEL: "glm-4.5-air"   # improve 自评（第二次 LLM 调用，pr-agent 0.39 mandatory 的
                                                          # self-reflection 打分）专用模型 = config.model_reasoning，
                                                          # 【不是】fallback_models（后者是主调用失败换模清单，已清空）。
                                                          # 自评是浅任务，小模型即可，improve 健康路径耗时近乎减半。
          TOUCHSTONE_LLM_NUM_RETRIES: ${{ secrets.TOUCHSTONE_LLM_NUM_RETRIES }}
                                                          # tenacity 层重试次数 N。未设/空 = 默认 0 = 不重试——全量
                                                          # 183 run 实证：真实失败（超时+长生成断连）全部发生在 600s+
                                                          # 后，轮内重试救回率 0/8。快窗内抖动类失败自动 N+1（见下）。
                                                          # litellm/openai client 内层一律 0，不再参与重试。
          # TOUCHSTONE_LLM_RETRY_FAST_WINDOW: "120"     # 快窗（秒）：失败发生在此窗内且为抖动类（秒级瞬断/快速 5xx）
                                                          # 才享受 N+1；窗外一律视为系统性失败按 N（默认0）处理。0=关闭加成。
          TOUCHSTONE_LLM_STREAM: "true"                 # glm 系列（主模型+自评模型）流式调用。false 回退非流式。
          TOUCHSTONE_LLM_THINKING: ${{ secrets.TOUCHSTONE_LLM_THINKING }}
                                                          # 思考模式开关：disabled / enabled，未设=端点默认。注入请求体
                                                          # {"thinking":{"type":...}}（GLM 方言，litellm extra_body 透传
                                                          # 已实测）。思考型端点默认开思考时每调用先烧数千 reasoning
                                                          # token——大 diff improve 单调用 10min+ 的头号嫌疑。优先在网关
                                                          # 侧对本 key 默认关（治本）；网关不可改时配 disabled。主模型与
                                                          # 自评模型统一生效。
          TOUCHSTONE_LITELLM_VERBOSE: "true"            # 诊断：litellm.set_verbose=True（runner.py:170 读取），把完整请求
                                                          # (model/messages/token 估算)打到 stderr → 进 pr-agent-interaction artifact。
                                                          # 定位"LLM 被调了没/输入多大/真实异常"。确认后可置 false 关闭。
          TOUCHSTONE_SKIP_GATE: "true"                 # 不自发总闸：由下方 gate job 在(可选)verify 之后统一发
          # 经验库路径：必须用 learning_loop 认的 env 名 TOUCHSTONE_EXPERIENCE（不是 STORE_PATH），
          # 否则评审侧 load_store() 读不到 learn.yml 维护的 data/experience_store.json。
          TOUCHSTONE_EXPERIENCE: "data/experience_store.json"
          TOUCHSTONE_EXPERIENCE_ENABLED: "true"
          TOUCHSTONE_EXPERIENCE_REF: "origin/${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}"  # 从受信 base ref 读经验库（防 PR 篡改工作树投毒）         # 评审路径注入开关（review_provider._experience_injection 认）
          # 评审健康度看板（可选，默认关）：置 true 后，每轮在本仓开/重写一个带 label 的 issue
          # 成"活"看板（本轮快照 + 滚动趋势；body 重写不发通知，仅显著事件追加评论）。
          # 经 repo variable 配（Settings → Secrets and variables → Actions → Variables，
          # 建 TOUCHSTONE_METRICS_ISSUE=true）——不设/空 = 关（默认，零行为变化），设 'true' 开。
          # 用 bare vars.（与上方 AUTONOMY_* 同 convention）：空值经 dict(os.environ) 透传给
          # orchestrator → metrics_issue.run 第一道 `!= "true"` 判 disabled（Python 拥有默认/fail-closed）。
          TOUCHSTONE_METRICS_ISSUE: ${{ vars.TOUCHSTONE_METRICS_ISSUE }}
          # TOUCHSTONE_METRICS_ISSUE_LABEL: "touchstone-metrics"   # 看板 issue 的 label（若改 vars. 须在 Python 侧处理空串，勿直接 uncomment）
          # TOUCHSTONE_METRICS_ISSUE_WINDOW: "50"                   # 滚动历史保留轮数（bounded FIFO）
        run: python -m touchstone.orchestrator
      - name: Save PR-Agent venv (only on success + cache miss)
        # 闭环 round-5 finding「Persist cache even when job fails downstream」+ round-1 finding「Skip cache save on
        # exact match」：本步仅当【整条 touchstone job 成功 且 restore 未命中】时跑。
        # success() = checkout→…→Run review 全成功（不从失败 run 持久化状态）；
        # steps.pragent-venv.outputs.cache-hit != 'true' = 仅 miss 时才 save——exact-match 命中时 restore 已复用
        #   整套 venv、无新内容可写，跳过 save。此乃 actions/cache 文档 restore/save 拆分的 canonical pattern
        #   （见 README「Saving cache」节示例）；同时也避免 actions/cache/save@v4 在 key 已存在时报
        #   "Cache already exists" 把整条 job 染红（否则首轮 save 落盘后，往后每轮 restore 命中→save 仍跑→报错→job 失败）。
        # 降级轮 job 仍判 success（orchestrator 优雅降级 exit 0，已实证 run 29463635695），故不损命中率；只真崩溃才跳 save。
        # 边界：两 run 并发同 key 竞态（restore miss、save 前 rival 刚落盘同 key）会让 save@v4 报 existing-key 错。
        #   缓存是 best-effort 性能优化，绝不该让一次瞬态 save 错（竞态/缓存服务抖）把整条 job 染红、卡住 PR——
        #   故 continue-on-error: true（闭环 round-2 finding「Prevent transient cache save errors from failing the job」）：
        #   save 失败只留黄警告、job 仍 success。罕见、自愈（下轮 cache-hit=true 跳 save），同 PR#80 stale-cache 取舍。
        # key 必须与 restore 步完全一致（同 key 命中→此处 if 跳过；miss→此处 落盘）。
        if: success() && steps.pragent-venv.outputs.cache-hit != 'true'
        continue-on-error: true     # 缓存 best-effort：save 失败（竞态/瞬态）不染红 job、不卡 PR
        uses: actions/cache/save@v4
        with:
          path: .pragent-venv
          key: pragent-venv-${{ runner.os }}-py${{ steps.py.outputs.python-version }}-pragent${{ env.PRA_VERSION }}-lock${{ hashFiles('pragent-constraints.txt') }}-v1
      - name: Upload LLM interaction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-interaction
          path: pr-agent-interaction.log
          if-no-files-found: ignore
      - name: Upload findings (校准入口 + gate/auto_merge 组装输入)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-findings
          path: touchstone-findings.json
          if-no-files-found: ignore
      - name: Upload metrics (运维可观测性：可信率/静默故障/放行率聚合)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-metrics
          path: touchstone-metrics.json
          if-no-files-found: ignore

  # ---- 可选深检：verify（默认关；vars.VERIFY_ENABLED=='true' 且风险分流判为需验证时才跑）----
  # 凭据隔离（设计 §6.6 的落地）：verify 拆成两个 job——
  #   verify_plan    持有 LLM 凭据，但【绝不执行】PR 代码（只读接口 + LLM 生成验收测试，
  #                  见 verify_change.plan_verification 的不变式），产出 acceptance-tests.json。
  #   verify_execute 真正在 worktree 里执行 PR 代码（pytest/mvn 收集期即可任意执行），
  #                  env 零 secret + persist-credentials:false（.git/config 也无 token）+
  #                  job 权限降为 contents:read——PR 代码既无凭据可窃、拿到 token 也伪造不了总闸。
  # 结果写 verify-result.json，由 gate job 经 verify 插件折进总闸。
  verify_plan:
    needs: touchstone
    if: ${{ vars.VERIFY_ENABLED == 'true' && (needs.touchstone.outputs.decision == 'targeted_tests' || needs.touchstone.outputs.decision == 'full_suite') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read             # 覆盖 workflow 级继承——本 job 不需要 checks/pr 写权
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0           # plan 需读 head 接口（只读 worktree，不执行）
          persist-credentials: false   # 不把 token 写进 .git/config
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -e .
      - name: plan（持密；不执行 PR 代码）
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY:  ${{ secrets.LLM_API_KEY }}
          LLM_TEST_MODEL: ${{ secrets.LLM_TEST_MODEL }}
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          VERIFY_MODE: ${{ needs.touchstone.outputs.decision }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO_DIR: "."
        run: python -m verify.verify_change --phase plan
      - uses: actions/upload-artifact@v4
        with:
          name: verify-plan
          path: acceptance-tests.json

  verify_execute:
    needs: [touchstone, verify_plan]
    runs-on: ubuntu-latest
    permissions:
      contents: read             # 最小权限：继承 workflow 级的 checks:write 会让 PR 代码
                                 # 拿 .git/config 里的 token 伪造 touchstone/gate（绕闸链）
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0           # worktree 需要 base/head 两个 commit
          persist-credentials: false   # 关键：本 job 执行 PR 代码——env 零 secret 之外，
                                       # 还必须保证 .git/config 里也没有 token 可窃
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -e .
      - uses: actions/download-artifact@v4
        with:
          name: verify-plan
      - name: execute（执行 PR 代码；env 零 secret）
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
          VERIFY_MODE: ${{ needs.touchstone.outputs.decision }}
          REPO_DIR: "."
        run: python -m verify.verify_change --phase execute
      - name: Upload verify result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-result
          path: verify-result.json
          if-no-files-found: ignore

  # ---- 质量门禁：聚合 touchstone 规则 + 转达检查 +（若跑过）verify → 对外发【一个】总闸 ----
  # needs verify_execute 但用 !cancelled() 兜底：verify 链被跳过（默认）时本 job 仍运行，verify 插件记中性、不挡。
  gate:
    needs: [touchstone, verify_execute]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .
      - name: Download touchstone (+ verify if ran) outputs
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true     # touchstone-findings.json (+ verify-result.json) → cwd
        continue-on-error: true
      - name: Aggregate & post the single gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TOUCHSTONE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}   # findings 缺失时据它发"未产出结果"failure check
          REPO_DIR: "."
        run: python -m touchstone.checks    # 发总闸并把含 verify 的结论写回 touchstone-findings.json
      - name: Re-upload findings with final gate (供 auto_merge 读含 verify 的总闸)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: touchstone-findings
          path: touchstone-findings.json
          overwrite: true
          if-no-files-found: ignore

  # ── 自动放行（可选，默认关；§4.7）──autonomy 只读总闸结论，不再依赖 verify job/CI_GREEN ──
  auto_merge:
    needs: [touchstone, gate]
    if: ${{ vars.AUTONOMY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 仅本 job 需要写权限（merge）
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install -e .
      - name: Download touchstone findings (final, gate-updated)
        uses: actions/download-artifact@v4
        with:
          name: touchstone-findings
          continue-on-error: true
      - name: Stage graduated change-classes
        run: cp .touchstone/graduated-classes.json graduated-classes.json 2>/dev/null || echo '{"graduated_classes":[]}' > graduated-classes.json
      - name: Decide & (maybe) auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AUTONOMY_TRIPPED: ${{ vars.AUTONOMY_TRIPPED }}
          AUTONOMY_ENABLED: ${{ vars.AUTONOMY_ENABLED }}
          AUTONOMY_SHADOW: ${{ vars.AUTONOMY_SHADOW }}
          TOUCHSTONE_AUTONOMY_TRUSTED_ASSOCIATIONS: "OWNER,MEMBER,COLLABORATOR"
                                          # 作者信任闸（第 9 闸）：仅这些 GitHub author_association 的作者
                                          # 可被自动放行——三者均需仓库/组织侧授予、作者不可自证；
                                          # CONTRIBUTOR/NONE 等任意人可达成的关联不信。产物缺作者信息时
                                          # fail-closed 不放行。
          # TOUCHSTONE_AUTONOMY_AUTHOR_ALLOWLIST: ""   # 额外放行 login 白名单（逗号分隔、大小写不敏感），
                                          # 与关联闸取并集；给外协/机器人账号开口子用，默认空。
        run: python -m touchstone.autonomy --execute
