# .github/workflows/ci.yml
# Touchstone 自己的测试套件 —— 此前 5 个 workflow 没有一个跑 pytest，
# 一个以"测试是否真的通过"作准入哲学的门禁系统，自身核心必须先过自己的门。
# 覆盖率门槛在 pyproject.toml [tool.coverage.report] fail_under 统一维护（对自己生效，
# 与 verify 对被检仓库的 COV_MIN 同款精神）。
name: CI

on:
  push:
    branches: [main]
  pull_request:            # 普通 pull_request 事件：无 secrets，跑不可信代码安全

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Ruff（只抓真缺陷，规则集见 pyproject [tool.ruff]）
        run: |
          pip install ruff
          ruff check touchstone/ verify/ tests/ examples/
      - name: mypy（渐进：默认宽松模式，配置见 pyproject [tool.mypy]）
        run: |
          pip install -e . mypy types-PyYAML types-requests
          python -m mypy touchstone/ verify/
      - name: 依赖 CVE 审计（主仓锁，阻断）
        # constraints.txt 是给客户的复现锁——出现已知漏洞版本即 CI 红（fail-loud）。
        # 咨询库更新可能让本步"自发"变红：这是特性不是缺陷（新披露 CVE 触达即报警）。
        run: |
          pip install pip-audit
          pip-audit -r constraints.txt --no-deps
      - name: 依赖 CVE 审计（PR-Agent venv 锁，信息型不阻断）
        # pr-agent 对多数依赖精确钉死（==），带 CVE 版本无法越过上游硬钉修复（见 SECURITY.md
        # 供应链信任边界）——长期非零的审计若阻断只会教人忽略红灯，故 continue-on-error 只留可见记录；
        # pr-agent 升版（PRA_VERSION + 重生成锁）时以本步输出核对残留是否收敛。
        continue-on-error: true
        run: pip-audit -r pragent-constraints.txt --no-deps

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]   # 下限（pyproject requires-python）+ 生产钉的版本
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Test with coverage floor
        run: |
          coverage run -m pytest tests/ -q
          coverage report
