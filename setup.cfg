[mutmut]
# 变异测试范围 = 确定性裁决代码（红线契约的裁决逻辑，变异测试对它们价值最高）。
# 第一轮只测 contract_check；现扩至 stack_rules（栈规则）/loop（收敛判定）/
# checklist（销项状态机）。产物 mutants/ 不入库（.gitignore）。
# 值为多行列表（mutmut 3 setup.cfg 语法：一行一个）。
source_paths=
    touchstone/contract_check.py
    touchstone/stack_rules.py
    touchstone/loop.py
    touchstone/checklist.py
pytest_add_cli_args_test_selection=
    tests/test_contract.py
    tests/test_stack_rules.py
    tests/test_loop_govern_calibrate.py
    tests/test_revision_items.py
# 沙箱数据：mutmut 只复制 source_paths+tests，测试夹具要读的规则/契约文件需显式带上
# （修复此前"mutmut 3.x 与本仓测试集成需单独配置"的遗留：rule_index 夹具读 standards.yaml）。
also_copy=
    .touchstone/
    touchstone/
    verify/
    pyproject.toml
